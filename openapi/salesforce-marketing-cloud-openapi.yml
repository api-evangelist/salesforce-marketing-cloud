components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: >-
        Marketing Cloud uses OAuth 2.0 client credentials flow for
        authentication. Obtain a client ID and secret from an installed package
        in Marketing Cloud Setup, then exchange them for an access token at the
        authentication endpoint.
      flows:
        clientCredentials:
          tokenUrl: https://YOUR_SUBDOMAIN.auth.marketingcloudapis.com/v2/token
          scopes: {}
  schemas:
    Contact:
      type: object
      description: >-
        Represents a contact in Marketing Cloud. A contact is an individual
        who interacts with marketing campaigns across channels.
      properties:
        contactKey:
          type: string
          description: >-
            Unique identifier for the contact. This value is used across all
            Marketing Cloud channels and applications.
          example: example_value
        contactID:
          type: integer
          description: System-generated unique numeric identifier
          example: '500123'
        contactStatus:
          type: string
          description: Current status of the contact
          enum:
          - Active
          - Inactive
          - Bounced
          - Held
          - Unsubscribed
          example: Active
        createdDate:
          type: string
          format: date-time
          description: Date and time the contact was created
          example: '2026-01-15T10:30:00Z'
        modifiedDate:
          type: string
          format: date-time
          description: Date and time the contact was last modified
          example: '2026-01-15T10:30:00Z'
        attributeSets:
          type: array
          description: Collection of attribute sets associated with the contact
          items:
            $ref: '#/components/schemas/AttributeSet'
          example: []
      required:
      - contactKey
    AttributeSet:
      type: object
      description: >-
        A named collection of attributes that define a category of contact
        data, such as Email Addresses or MobileConnect Demographics.
      properties:
        name:
          type: string
          description: Name of the attribute set
          example: Example Title
        items:
          type: array
          description: Collection of attribute value groups
          items:
            type: object
            properties:
              values:
                type: array
                items:
                  $ref: '#/components/schemas/AttributeValue'
          example: []
    AttributeValue:
      type: object
      description: A single attribute name-value pair within an attribute set
      properties:
        name:
          type: string
          description: Name of the attribute
          example: Example Title
        value:
          description: Value of the attribute
          example: example_value
      required:
      - name
      - value
    CreateContactsRequest:
      type: object
      description: Request body for creating one or more contacts
      properties:
        contactKey:
          type: string
          description: Unique identifier for the contact
          example: example_value
        attributeSets:
          type: array
          description: Attribute sets and values to assign to the contact
          items:
            $ref: '#/components/schemas/AttributeSet'
          example: []
      required:
      - contactKey
    UpdateContactRequest:
      type: object
      description: Request body for updating contact attributes
      properties:
        attributeSets:
          type: array
          description: Attribute sets and values to update
          items:
            $ref: '#/components/schemas/AttributeSet'
          example: []
      required:
      - attributeSets
    ContactResponse:
      type: object
      description: Response returned after contact creation or update operations
      properties:
        operationStatus:
          type: string
          description: Overall status of the operation
          example: example_value
        requestServiceMessageID:
          type: string
          description: Unique identifier for the request
          example: '500123'
        responseDateTime:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        resultMessages:
          type: array
          items:
            type: object
            properties:
              resultType:
                type: string
              resultCode:
                type: string
              resultMessage:
                type: string
          example: []
    ContactSearchRequest:
      type: object
      description: Request body for searching contacts with filter criteria
      properties:
        conditionSet:
          type: object
          description: Root condition set for the search
          properties:
            operator:
              type: string
              enum:
              - AND
              - OR
            conditions:
              type: array
              items:
                type: object
                properties:
                  attribute:
                    type: object
                    properties:
                      groupName:
                        type: string
                      name:
                        type: string
                  operator:
                    type: string
                    enum:
                    - Equals
                    - NotEquals
                    - GreaterThan
                    - LessThan
                    - Contains
                    - StartsWith
                    - EndsWith
                    - IsNull
                    - IsNotNull
                  value:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: string
            conditionSets:
              type: array
              items: {}
          example: example_value
        returnAttributes:
          type: array
          description: Attributes to include in the search results
          items:
            type: object
            properties:
              groupName:
                type: string
              name:
                type: string
          example: []
    ContactSearchResponse:
      type: object
      description: Response returned from a contact search operation
      properties:
        count:
          type: integer
          description: Total number of matching contacts
          example: 10
        page:
          type: integer
          example: 10
        pageSize:
          type: integer
          example: 10
        items:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
          example: []
    DeleteContactResponse:
      type: object
      description: Response from a contact delete operation
      properties:
        operationStatus:
          type: string
          example: example_value
        requestServiceMessageID:
          type: string
          example: '500123'
        responseDateTime:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        operationInitiated:
          type: boolean
          description: Whether the asynchronous delete was successfully initiated
          example: true
    AttributeSetsResponse:
      type: object
      description: Response containing a collection of attribute sets
      properties:
        count:
          type: integer
          example: 10
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              attributes:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    dataType:
                      type: string
                    isRequired:
                      type: boolean
                    isReadOnly:
                      type: boolean
          example: []
    Journey:
      type: object
      description: >-
        Represents a customer journey in Marketing Cloud. A journey defines
        an automated workflow that guides contacts through a series of
        marketing interactions across channels.
      properties:
        id:
          type: string
          format: uuid
          description: System-generated unique identifier for the journey
          example: abc123
        key:
          type: string
          description: Customer-defined unique key for the journey
          example: example_value
        name:
          type: string
          description: Display name of the journey
          example: Example Title
        description:
          type: string
          description: Description of the journey purpose
          example: A sample description.
        version:
          type: integer
          description: Current version number of the journey
          example: 10
        status:
          type: string
          description: Current status of the journey
          enum:
          - Draft
          - Published
          - ScheduledToPublish
          - Stopped
          - Unpublished
          example: Draft
        createdDate:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        modifiedDate:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        workflowApiVersion:
          type: number
          description: Version of the Journey Builder API used
          example: 42.5
        triggers:
          type: array
          description: Entry triggers that inject contacts into the journey
          items:
            $ref: '#/components/schemas/JourneyTrigger'
          example: []
        activities:
          type: array
          description: Activities that contacts pass through in the journey
          items:
            $ref: '#/components/schemas/JourneyActivity'
          example: []
        goals:
          type: array
          description: Goal criteria that measure journey success
          items:
            $ref: '#/components/schemas/JourneyGoal'
          example: []
        exits:
          type: array
          description: Exit criteria that remove contacts from the journey
          items:
            $ref: '#/components/schemas/JourneyExit'
          example: []
        stats:
          type: object
          description: Runtime statistics for the journey
          properties:
            currentPopulation:
              type: integer
              description: Number of contacts currently in the journey
            cumulativePopulation:
              type: integer
              description: Total contacts that have entered the journey
            metGoal:
              type: integer
              description: Number of contacts that met the journey goal
          example: example_value
    JourneyDefinition:
      type: object
      description: Specification for creating or updating a journey
      properties:
        key:
          type: string
          description: Customer-defined unique key for the journey
          example: example_value
        name:
          type: string
          description: Display name of the journey
          example: Example Title
        description:
          type: string
          description: Description of the journey purpose
          example: A sample description.
        workflowApiVersion:
          type: number
          description: Version of the Journey Builder API (e.g., 1.0)
          example: 42.5
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/JourneyTrigger'
          example: []
        activities:
          type: array
          items:
            $ref: '#/components/schemas/JourneyActivity'
          example: []
        goals:
          type: array
          items:
            $ref: '#/components/schemas/JourneyGoal'
          example: []
        exits:
          type: array
          items:
            $ref: '#/components/schemas/JourneyExit'
          example: []
      required:
      - name
      - workflowApiVersion
    JourneyTrigger:
      type: object
      description: >-
        Entry trigger configuration for a journey. Defines how contacts enter
        the journey, such as via API event, scheduled automation, or audience.
      properties:
        key:
          type: string
          description: Unique key for the trigger within the journey
          example: example_value
        name:
          type: string
          description: Display name of the trigger
          example: Example Title
        type:
          type: string
          description: Type of trigger
          enum:
          - APIEvent
          - ScheduledAutomation
          - Event
          - ContactAudience
          example: APIEvent
        eventDefinitionKey:
          type: string
          description: >-
            Key of the event definition associated with this trigger, used for
            API events
          example: example_value
        configurationArguments:
          type: object
          description: Trigger-specific configuration
          example: example_value
    JourneyActivity:
      type: object
      description: >-
        An activity within a journey. Activities represent the actions
        performed on contacts, such as sending emails, waiting, or making
        decisions.
      properties:
        key:
          type: string
          description: Unique key for the activity within the journey
          example: example_value
        name:
          type: string
          description: Display name of the activity
          example: Example Title
        type:
          type: string
          description: Type of activity
          enum:
          - EMAILV2
          - SMSSYNC
          - PUSHNOTIFICATION
          - WAIT
          - RANDOM_SPLIT
          - ENGAGEMENT_SPLIT
          - DECISION_SPLIT
          - JOIN
          - DATAEXTENSIONUPDATE
          - REST
          - CUSTOM
          example: EMAILV2
        configurationArguments:
          type: object
          description: Activity-specific configuration
          example: example_value
        outcomes:
          type: array
          description: Possible outcomes of the activity leading to next steps
          items:
            type: object
            properties:
              key:
                type: string
              next:
                type: string
                description: Key of the next activity in the journey
          example: []
      required:
      - key
      - type
    JourneyGoal:
      type: object
      description: Goal criteria for measuring journey success
      properties:
        key:
          type: string
          example: example_value
        name:
          type: string
          example: Example Title
        description:
          type: string
          example: A sample description.
        metCriteria:
          type: string
          description: Criteria expression that defines when the goal is met
          example: example_value
    JourneyExit:
      type: object
      description: Exit criteria that remove contacts from the journey
      properties:
        key:
          type: string
          example: example_value
        name:
          type: string
          example: Example Title
        criteria:
          type: string
          description: Criteria expression that triggers journey exit
          example: example_value
    JourneyCollection:
      type: object
      description: Paginated collection of journeys
      properties:
        count:
          type: integer
          description: Total number of journeys matching the query
          example: 10
        page:
          type: integer
          description: Current page number
          example: 10
        pageSize:
          type: integer
          description: Number of items per page
          example: 10
        items:
          type: array
          items:
            $ref: '#/components/schemas/Journey'
          example: []
    EntryEvent:
      type: object
      description: >-
        Event payload used to inject a contact into a journey via the API
        event trigger.
      properties:
        ContactKey:
          type: string
          description: Unique identifier for the contact entering the journey
          example: example_value
        EventDefinitionKey:
          type: string
          description: >-
            Key of the event definition matching the journey entry trigger
          example: example_value
        Data:
          type: object
          description: >-
            Additional data to pass to the journey as key-value pairs. These
            values are available to activities within the journey.
          additionalProperties: true
          example: example_value
      required:
      - ContactKey
      - EventDefinitionKey
    EntryEventResponse:
      type: object
      description: Response returned after firing a journey entry event
      properties:
        requestId:
          type: string
          description: Unique identifier for the event request
          example: '500123'
        eventInstanceId:
          type: string
          format: uuid
          description: Unique instance identifier for this event firing
          example: '500123'
    PublishResponse:
      type: object
      description: Response returned when a journey publish operation is initiated
      properties:
        statusId:
          type: string
          description: Identifier for tracking the publish operation status
          example: '500123'
        message:
          type: string
          example: example_value
    Asset:
      type: object
      description: >-
        Represents a marketing asset in Content Builder. Assets include emails,
        templates, images, content blocks, and other content types used in
        marketing campaigns.
      properties:
        id:
          type: integer
          description: System-generated unique identifier for the asset
          example: abc123
        customerKey:
          type: string
          description: Customer-defined unique key for the asset
          example: example_value
        name:
          type: string
          description: Display name of the asset
          example: Example Title
        description:
          type: string
          description: Description of the asset
          example: A sample description.
        assetType:
          $ref: '#/components/schemas/AssetType'
        category:
          type: object
          description: Category (folder) containing the asset
          properties:
            id:
              type: integer
            name:
              type: string
            parentId:
              type: integer
          example: example_value
        content:
          type: string
          description: >-
            Primary content of the asset, typically HTML or text depending on
            asset type
          example: example_value
        views:
          type: object
          description: >-
            Channel-specific content views (e.g., html, text, subjectLine,
            preheader)
          properties:
            html:
              type: object
              properties:
                content:
                  type: string
            text:
              type: object
              properties:
                content:
                  type: string
            subjectLine:
              type: object
              properties:
                content:
                  type: string
            preheader:
              type: object
              properties:
                content:
                  type: string
          example: example_value
        data:
          type: object
          description: Asset-type-specific data and configuration
          additionalProperties: true
          example: example_value
        tags:
          type: array
          description: Tags assigned to the asset for organization
          items:
            type: string
          example: []
        status:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
              enum:
              - Draft
              - Approved
          example: example_value
        createdDate:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        modifiedDate:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        createdBy:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
          example: example_value
        modifiedBy:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
          example: example_value
    AssetType:
      type: object
      description: >-
        Defines the type of an asset. Each type has a unique ID and name.
        Common types include htmlemail (208), templatebasedemail (207),
        htmlblock (197), codesnippetblock (220), and image (28).
      properties:
        id:
          type: integer
          description: Numeric identifier for the asset type
          example: abc123
        name:
          type: string
          description: Name of the asset type
          example: Example Title
    AssetDefinition:
      type: object
      description: Specification for creating or updating an asset
      properties:
        name:
          type: string
          description: Display name of the asset
          example: Example Title
        description:
          type: string
          description: Description of the asset
          example: A sample description.
        customerKey:
          type: string
          description: Customer-defined unique key
