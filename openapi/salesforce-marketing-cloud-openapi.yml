  /asset/v1/content/assets/query:
    post:
      operationId: queryAssets
      summary: Salesforce Marketing Cloud Query Assets With Advanced Filtering
      description: >-
        Performs an advanced query against assets using a structured query
        object. Supports complex filtering with AND/OR logic, nested
        conditions, and multiple sort criteria. More powerful than the
        OData-style filter on the list endpoint.
      tags:
      - Assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetQuery'
            example:
              page:
                page: 1
                pageSize: 50
              query:
                property: assetType.name
                simpleOperator: equal
                value: htmlemail
              sort:
              - property: modifiedDate
                direction: DESC
              fields:
              - id
              - name
              - assetType
              - modifiedDate
      responses:
        '200':
          description: Query results returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCollection'
        '400':
