              description: Welcome email sent to new subscribers
              assetType:
                name: htmlemail
                id: 208
              views:
                html:
                  content: '<html><body><h1>Welcome!</h1></body></html>'
                subjectLine:
                  content: Welcome to our newsletter
              data:
                email:
